name: Windows Sample Binaries Release

run-name: Release self-contained sample binaries for supported Windows targets

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: assemblyengine-release
  cancel-in-progress: false

jobs:
  prepare_release:
    name: Prepare sample release metadata
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
      release_name: ${{ steps.tag.outputs.release_name }}

    steps:
      - name: Calculate release tag
        id: tag
        uses: actions/github-script@v7
        with:
          script: |
            const now = new Date();
            const year = now.getUTCFullYear();
            const month = String(now.getUTCMonth() + 1).padStart(2, '0');
            const day = String(now.getUTCDate()).padStart(2, '0');
            const prefix = `v${year}.${month}.${day}.`;
            const escapedPrefix = prefix.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');

            const refs = await github.paginate(github.rest.git.listMatchingRefs, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: `tags/${prefix}`
            });

            const sequenceNumbers = refs
              .map(({ ref }) => ref.replace('refs/tags/', ''))
              .map((tag) => {
                const match = tag.match(new RegExp(`^${escapedPrefix}(\\d+)$`));
                return match ? Number.parseInt(match[1], 10) : 0;
              })
              .filter((value) => Number.isInteger(value) && value > 0);

            const nextSequence = sequenceNumbers.length === 0
              ? 1
              : Math.max(...sequenceNumbers) + 1;

            const tag = `${prefix}${nextSequence}`;

            core.info(`Next release tag: ${tag}`);
            core.setOutput('tag', tag);
            core.setOutput('release_name', `AssemblyEngine Sample Binaries ${tag}`);

  build:
    name: ${{ matrix.name }}
    needs: prepare_release
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Publish Windows x64 samples
            runner: windows-latest
            target: x64
            artifact: windows-x64-sample-binaries
            asset_suffix: windows-x64-samples
            output_dir: build\sample-publish\x64
            installNasm: true
          - name: Publish Windows ARM64 samples
            runner: windows-11-arm
            target: arm64
            artifact: windows-arm64-sample-binaries
            asset_suffix: windows-arm64-samples
            output_dir: build\sample-publish\arm64
            installNasm: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Install NASM
        if: ${{ matrix.installNasm }}
        shell: pwsh
        run: choco install nasm --yes --no-progress

      - name: Validate toolchain
        shell: pwsh
        run: .\setup.ps1 -TargetArchitecture ${{ matrix.target }}

      - name: Publish self-contained samples
        shell: pwsh
        run: .\shell\publish_samples.ps1 -TargetArchitecture ${{ matrix.target }} -OutputRoot '${{ matrix.output_dir }}'

      - name: Summarize published samples
        shell: pwsh
        run: |
          @"
          ## Windows sample binaries
          This workflow publishes self-contained runnable sample applications for Windows ${{ matrix.target }}.
          The packaged zip contains sample folders only and is not a source archive or standalone engine SDK/runtime binary drop.

          Included samples:
          - basic (Dash Harvest)
          - fps
          - visual-novel
          "@ | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8

      - name: Package binaries
        id: package
        shell: pwsh
        run: |
          $assetName = "AssemblyEngine-samples-${{ needs.prepare_release.outputs.tag }}-${{ matrix.asset_suffix }}.zip"
          $assetPath = Join-Path $env:GITHUB_WORKSPACE $assetName
          $publishRoot = Join-Path $env:GITHUB_WORKSPACE '${{ matrix.output_dir }}'
          $sourcePath = Join-Path $publishRoot '*'

          if (-not (Test-Path $publishRoot)) {
            throw "Sample output '$publishRoot' was not produced."
          }

          if (Test-Path $assetPath) {
            Remove-Item $assetPath -Force
          }

          Compress-Archive -Path $sourcePath -DestinationPath $assetPath

          "asset_path=$assetPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Upload packaged binaries
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ steps.package.outputs.asset_path }}
          if-no-files-found: error

  release:
    name: Publish GitHub sample release
    needs:
      - prepare_release
      - build
    runs-on: ubuntu-latest

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-sample-assets

      - name: Write release notes
        run: |
          cat > release-notes.md <<'EOF'
          Self-contained Windows sample bundles for AssemblyEngine.

          These assets contain runnable sample applications for the currently supported Windows targets:
          - basic (Dash Harvest)
          - fps
          - visual-novel

          They are sample bundles only. They are not source archives and not standalone engine SDK/runtime binaries.
          EOF

      - name: Create release and upload assets
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_NAME: ${{ needs.prepare_release.outputs.release_name }}
          RELEASE_TAG: ${{ needs.prepare_release.outputs.tag }}
        run: |
          gh release create "$RELEASE_TAG" \
            release-sample-assets/windows-x64-sample-binaries/*.zip \
            release-sample-assets/windows-arm64-sample-binaries/*.zip \
            --repo "$GITHUB_REPOSITORY" \
            --target "$GITHUB_SHA" \
            --title "$RELEASE_NAME" \
            --notes-file release-notes.md