<!DOCTYPE html>
<html>
<head>
    <title>Dash Harvest HUD</title>
</head>
<body>
    <div id="top-bar">
        <div id="fps-counter">FPS 0</div>
        <div id="score">Score 0</div>
        <div id="wave">Wave 1</div>
        <div id="lives">Hull 4</div>
        <div id="dash">Dash READY</div>
        <div id="best">Best 0</div>
    </div>

    <div id="center-message">
        <div id="message-title">Dash Harvest</div>
        <div id="message-subtitle">Collect sparks. Dash through hunters.</div>
    </div>

    <div id="objective-panel">
        <div id="objective">Collect every spark to trigger the next wave.</div>
        <div id="hint">WASD or Arrows move. Space dashes. R restarts.</div>
    </div>
</body>
</html>
